    <text x="1038" y="254" fill="#1d1d1f" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="28" font-weight="600" letter-spacing="-0.3">데이터 계층</text>
