    <text x="482" y="446" fill="#cccccc" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="14">매장 · 상품 · 장바구니 · 주문 · 픽업 · 알림 · 정산</text>

    <rect x="458" y="478" width="282" height="54" rx="11" fill="#2a2a2c" stroke="#4a4a4d"/>
