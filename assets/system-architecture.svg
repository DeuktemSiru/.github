    <path d="M1058 457h18l7 8h29v32h-54z" fill="none" stroke="#c94b28" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="1128" y="465" fill="#1d1d1f" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="17" font-weight="600">상품 이미지</text>
    <text x="1128" y="492" fill="#7a7a7a" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="14">Docker Volume</text>
