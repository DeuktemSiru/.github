    <rect x="88" y="190" width="42" height="26" rx="13" fill="#c94b28"/>
    <text x="109" y="208" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="12" font-weight="600">01</text>
    <text x="88" y="254" fill="#1d1d1f" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="28" font-weight="600" letter-spacing="-0.3">Android 앱</text>
    <text x="88" y="282" fill="#7a7a7a" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="14">Kotlin · Retrofit</text>

    <rect x="88" y="316" width="252" height="94" rx="18" fill="#fafafc" stroke="#e0e0e0"/>
    <rect x="108" y="337" width="27" height="44" rx="6" fill="none" stroke="#c94b28" stroke-width="2.5"/>
    <circle cx="121.5" cy="375" r="1.8" fill="#c94b28"/>
    <text x="154" y="351" fill="#1d1d1f" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="17" font-weight="600">구매자 앱</text>
    <text x="154" y="378" fill="#7a7a7a" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="14">탐색 · 주문 · 픽업</text>

    <rect x="88" y="430" width="252" height="94" rx="18" fill="#fafafc" stroke="#e0e0e0"/>
    <rect x="108" y="451" width="27" height="44" rx="6" fill="none" stroke="#c94b28" stroke-width="2.5"/>
    <circle cx="121.5" cy="489" r="1.8" fill="#c94b28"/>
    <text x="154" y="465" fill="#1d1d1f" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="17" font-weight="600">판매자 앱</text>
