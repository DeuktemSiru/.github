<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title description">
  <title id="title">득템시루 시스템 아키텍처</title>
  <desc id="description">구매자 및 판매자 Android 앱에서 Spring Boot 백엔드를 거쳐 PostgreSQL과 이미지 저장소로 이어지는 핵심 흐름과 외부 서비스 및 모니터링 구성을 보여주는 다이어그램</desc>
  <defs>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L0 6L9 3Z" fill="#c94b28"/>
    </marker>
    <marker id="arrow-muted" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L0 6L9 3Z" fill="#7a7a7a"/>
    </marker>
  </defs>

  <rect width="1400" height="820" rx="24" fill="#f5f5f7"/>

  <!-- Header -->
  <text x="64" y="66" fill="#1d1d1f" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="40" font-weight="600" letter-spacing="-0.4">득템시루 시스템 아키텍처</text>
  <text x="64" y="101" fill="#7a7a7a" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="17" font-weight="400" letter-spacing="-0.2">두 Android 앱이 하나의 안전한 API와 데이터 계층을 공유합니다.</text>
