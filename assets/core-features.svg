<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="590" viewBox="0 0 1400 590" role="img" aria-labelledby="title description">
  <title id="title">득템시루 핵심 기능</title>
  <desc id="description">구매자 앱, 판매자 앱, 백엔드의 핵심 기능을 역할별로 보여주는 다이어그램</desc>

  <rect width="1400" height="590" rx="24" fill="#f5f5f7"/>
  <text x="64" y="65" fill="#1d1d1f" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="40" font-weight="600" letter-spacing="-0.4">역할별 핵심 기능</text>
  <text x="64" y="100" fill="#7a7a7a" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="17">탐색부터 주문, 픽업, 정산까지 하나의 서비스로 연결합니다.</text>
  <rect x="64" y="126" width="1272" height="1" fill="#e0e0e0"/>

  <!-- Buyer -->
  <g>
    <rect x="64" y="166" width="397" height="360" rx="18" fill="#ffffff" stroke="#e0e0e0"/>
    <rect x="88" y="190" width="42" height="26" rx="13" fill="#c94b28"/>
    <text x="109" y="208" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="12" font-weight="600">01</text>
    <text x="88" y="254" fill="#1d1d1f" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="28" font-weight="600">구매자 앱</text>
    <text x="88" y="282" fill="#7a7a7a" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="14">발견하고, 주문하고, 픽업합니다.</text>

    <circle cx="101" cy="326" r="6" fill="#c94b28"/>
    <text x="123" y="332" fill="#1d1d1f" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="17" font-weight="600">주변 매장 탐색 · 지도</text>
    <rect x="88" y="352" width="349" height="1" fill="#f0f0f0"/>
    <circle cx="101" cy="380" r="6" fill="#c94b28"/>
    <text x="123" y="386" fill="#1d1d1f" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="17" font-weight="600">장바구니 · 시루 결제</text>
    <rect x="88" y="406" width="349" height="1" fill="#f0f0f0"/>
    <circle cx="101" cy="434" r="6" fill="#c94b28"/>
    <text x="123" y="440" fill="#1d1d1f" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="17" font-weight="600">픽업 코드 · QR · 길찾기</text>
    <rect x="88" y="460" width="349" height="1" fill="#f0f0f0"/>
    <circle cx="101" cy="488" r="6" fill="#c94b28"/>
    <text x="123" y="494" fill="#1d1d1f" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="17" font-weight="600">찜 · 주문 내역</text>
  </g>

  <!-- Seller -->
  <g>
    <rect x="501" y="166" width="398" height="360" rx="18" fill="#272729"/>
    <rect x="525" y="190" width="42" height="26" rx="13" fill="#c94b28"/>
    <text x="546" y="208" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="12" font-weight="600">02</text>
    <text x="525" y="254" fill="#ffffff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="28" font-weight="600">판매자 앱</text>
    <text x="525" y="282" fill="#cccccc" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="14">등록하고, 처리하고, 정산합니다.</text>

    <circle cx="538" cy="326" r="6" fill="#c94b28"/>
    <text x="560" y="332" fill="#ffffff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="17" font-weight="600">상품 등록 · 상태 관리</text>
    <rect x="525" y="352" width="350" height="1" fill="#4a4a4d"/>
    <circle cx="538" cy="380" r="6" fill="#c94b28"/>
    <text x="560" y="386" fill="#ffffff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="17" font-weight="600">주문 접수 · 처리</text>
    <rect x="525" y="406" width="350" height="1" fill="#4a4a4d"/>
    <circle cx="538" cy="434" r="6" fill="#c94b28"/>
    <text x="560" y="440" fill="#ffffff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="17" font-weight="600">픽업 검증 · 고객 알림</text>
    <rect x="525" y="460" width="350" height="1" fill="#4a4a4d"/>
    <circle cx="538" cy="488" r="6" fill="#c94b28"/>
    <text x="560" y="494" fill="#ffffff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="17" font-weight="600">매출 분석 · 정산</text>
  </g>

  <!-- Backend -->
  <g>
    <rect x="939" y="166" width="397" height="360" rx="18" fill="#ffffff" stroke="#e0e0e0"/>
    <rect x="963" y="190" width="42" height="26" rx="13" fill="#c94b28"/>
    <text x="984" y="208" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="12" font-weight="600">03</text>
    <text x="963" y="254" fill="#1d1d1f" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="28" font-weight="600">백엔드</text>
    <text x="963" y="282" fill="#7a7a7a" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="14">두 앱의 안전한 서비스 기반입니다.</text>

    <circle cx="976" cy="326" r="6" fill="#c94b28"/>
    <text x="998" y="332" fill="#1d1d1f" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="17" font-weight="600">JWT 인증 · 역할 기반 인가</text>
    <rect x="963" y="352" width="349" height="1" fill="#f0f0f0"/>
    <circle cx="976" cy="380" r="6" fill="#c94b28"/>
    <text x="998" y="386" fill="#1d1d1f" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="17" font-weight="600">매장 · 상품 · 주문 API</text>
    <rect x="963" y="406" width="349" height="1" fill="#f0f0f0"/>
    <circle cx="976" cy="434" r="6" fill="#c94b28"/>
    <text x="998" y="440" fill="#1d1d1f" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="17" font-weight="600">픽업 검증 · 알림</text>
    <rect x="963" y="460" width="349" height="1" fill="#f0f0f0"/>
    <circle cx="976" cy="488" r="6" fill="#c94b28"/>
    <text x="998" y="494" fill="#1d1d1f" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="17" font-weight="600">데이터 · 모니터링</text>
  </g>

  <rect x="64" y="558" width="1272" height="1" fill="#e0e0e0"/>
</svg>
