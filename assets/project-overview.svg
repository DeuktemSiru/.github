<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="500" viewBox="0 0 1400 500" role="img" aria-labelledby="title description">
  <title id="title">득템시루 프로젝트 소개</title>
  <desc id="description">마감 임박 상품을 주변 소비자와 연결해 폐기를 줄이고 시루 결제와 매장 픽업으로 지역 상권을 돕는 서비스 흐름</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L0 6L9 3Z" fill="#c94b28"/>
    </marker>
  </defs>

  <rect width="1400" height="500" rx="24" fill="#f5f5f7"/>
  <text x="64" y="65" fill="#1d1d1f" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="40" font-weight="600" letter-spacing="-0.4">버려질 상품을, 동네의 득템으로.</text>
  <text x="64" y="100" fill="#7a7a7a" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="17">시흥시 지역화폐 시루 기반 마감 할인 픽업 커머스</text>
  <rect x="64" y="126" width="1272" height="1" fill="#e0e0e0"/>

  <!-- Problem -->
  <g>
    <rect x="64" y="166" width="338" height="210" rx="18" fill="#ffffff" stroke="#e0e0e0"/>
    <text x="88" y="202" fill="#c94b28" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="14" font-weight="600">01 · 문제</text>
    <circle cx="113" cy="253" r="24" fill="#ffe7de"/>
    <path d="M101 248h24l-2 23h-20zm5-7h14m-11 0v-5h8v5" fill="none" stroke="#c94b28" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="153" y="253" fill="#1d1d1f" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="21" font-weight="600">마감 임박 상품</text>
    <text x="153" y="281" fill="#7a7a7a" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="14">오늘 팔리지 않으면 폐기</text>
    <text x="88" y="338" fill="#333333" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="17">소상공인의 손실과 음식물 낭비</text>
  </g>

  <!-- Connection -->
  <g>
    <rect x="531" y="166" width="338" height="210" rx="18" fill="#272729"/>
    <text x="555" y="202" fill="#ffbdaa" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="14" font-weight="600">02 · 연결</text>
    <circle cx="580" cy="253" r="24" fill="#c94b28"/>
    <path d="M571.9 253c0-1.71 1.39-3.1 3.1-3.1h4V248h-4a5 5 0 0 0 0 10h4v-1.9h-4c-1.71 0-3.1-1.39-3.1-3.1zm4.1 1h8v-2h-8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4v1.9h4a5 5 0 0 0 0-10z" fill="#ffffff"/>
    <text x="620" y="253" fill="#ffffff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="21" font-weight="600">득템시루</text>
    <text x="620" y="281" fill="#cccccc" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="14">판매자와 주변 소비자를 연결</text>
    <text x="555" y="338" fill="#ffffff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="17">할인 상품을 가까운 사용자에게 노출</text>
  </g>

  <!-- Outcome -->
  <g>
    <rect x="998" y="166" width="338" height="210" rx="18" fill="#ffffff" stroke="#e0e0e0"/>
    <text x="1022" y="202" fill="#c94b28" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="14" font-weight="600">03 · 픽업</text>
    <circle cx="1047" cy="253" r="24" fill="#ffe7de"/>
    <path d="M1035 249h24v18h-24zm4-7h16v7h-16m3 9h10" fill="none" stroke="#c94b28" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1087" y="253" fill="#1d1d1f" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="21" font-weight="600">시루 결제</text>
    <text x="1087" y="281" fill="#7a7a7a" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="14">가까운 매장에서 당일 수령</text>
    <text x="1022" y="338" fill="#333333" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="17">할인 구매부터 픽업까지 한 번에</text>
  </g>

  <path d="M402 271h129" fill="none" stroke="#c94b28" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M869 271h129" fill="none" stroke="#c94b28" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Shared value -->
  <g>
    <rect x="238" y="412" width="260" height="48" rx="24" fill="#ffffff" stroke="#e0e0e0"/>
    <circle cx="270" cy="436" r="6" fill="#c94b28"/>
    <text x="290" y="442" fill="#1d1d1f" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="17" font-weight="600">상품 폐기 감소</text>
    <rect x="570" y="412" width="260" height="48" rx="24" fill="#ffffff" stroke="#e0e0e0"/>
    <circle cx="602" cy="436" r="6" fill="#c94b28"/>
    <text x="622" y="442" fill="#1d1d1f" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="17" font-weight="600">소비자 할인 혜택</text>
    <rect x="902" y="412" width="260" height="48" rx="24" fill="#ffffff" stroke="#e0e0e0"/>
    <circle cx="934" cy="436" r="6" fill="#c94b28"/>
    <text x="954" y="442" fill="#1d1d1f" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="17" font-weight="600">지역 상권 매출</text>
  </g>
</svg>
